<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/proyecto/src/css/global.css">
    <link rel="stylesheet" href="/proyecto/src/css/inicio.css">
    <link rel="shortcut icon" href="/proyecto/public/assets/icons/data-analytics.png" type="image/x-icon">
    <title>Dashboard - Inicio</title>
</head>
<body>
    <ul>
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="/proyecto/src/html/usuarios.html#iniciousuarios">Usuarios</a></li>
        <li><a href="/proyecto/src/html/ventas.html#inicioventas">Ventas</a></li>
    </ul>

    <h1 id="#inicio">Bienvenido al Dashboard</h1>

    <hr>

    <div class="alert-message" id="alertBox">
        <img src="/proyecto/public/assets/icons/alarma.png" alt="Imagen de alerta">
        <div class="alert-content" id="alertContent"></div>
    </div>

<br>

    <table >
        <caption>Últimos datos de usuarios</caption>
        <tr>
            <th colspan="2">Usuarios</th>
        </tr>
        <tr>
            <td class="td1">Total de usuarios</td>
            <td id="totalUsuariosInicio"></td>
        </tr>
        <tr>
            <td>Promedio activos</td>
            <td id="promedioActivosInicio"></td>
        </tr>
    </table>

    <br>

    <table>
        <caption>Últimos datos de ventas</caption>
        <tr>
            <th colspan="2">Ventas</th>
        </tr>
        <tr>
            <td class="td1"">Total de ventas</td>
            <td id="totalVentasInicio"></td>
        </tr>
        <tr>
            <td>Gasto promedio</td>
            <td id="gastoPromedioInicio"></td>
        </tr>
    </table>

    <script type="module" src="../../dist/app/inicioApp.js"></script>
</body>
</html>
